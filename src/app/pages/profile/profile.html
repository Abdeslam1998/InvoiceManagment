<main class="pt-6 px-4 max-w-lg mx-auto space-y-8 pb-32 font-inter">
  <section class="mt-4">
    <p class="font-label text-sm tracking-tight text-on-surface-variant">Configuration</p>
    <h2 class="font-headline font-extrabold text-3xl tracking-tight text-on-surface">Mon Profil</h2>
  </section>
  
  <section class="space-y-4">
    <label class="font-label text-sm tracking-tight text-on-surface-variant font-medium uppercase px-1">Informations Administrateur</label>
    
    <app-input label="Email" placeholder="admin@exemple.com" icon="mail" [(ngModel)]="profile.email" type="email"></app-input>
    <app-input label="Nom du Responsable" placeholder="Nom Prénom" icon="person" [(ngModel)]="profile.responsibleName"></app-input>
  </section>

  <section class="space-y-4 pt-4 border-t border-outline-variant/10">
    <label class="font-label text-sm tracking-tight text-on-surface-variant font-medium uppercase px-1">Informations Société</label>
    
    <app-input label="Nom de la Société" placeholder="Ma Laiterie SARL" icon="business" [(ngModel)]="profile.companyName"></app-input>
    <app-input label="Adresse" placeholder="123 Rue de la Ferme" icon="location_on" [(ngModel)]="profile.address"></app-input>
    <app-input label="Téléphone" placeholder="+212 6..." icon="call" [(ngModel)]="profile.phone"></app-input>
  </section>

  @if (successMessage) {
    <div class="bg-primary/10 text-primary p-4 rounded-xl text-center text-sm font-bold border border-primary/20 animate-in fade-in zoom-in duration-300">
      {{ successMessage }}
    </div>
  }

</main>

<footer class="fixed bottom-0 left-0 w-full bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-t border-[#abb3b7]/15 px-6 pb-24 pt-4 flex gap-4 z-40">
  <app-button 
    variant="primary" 
    extraClasses="w-full" 
    [disabled]="loading || !profile.email || !profile.companyName"
    (onClick)="save()"
    icon="save"
  >
    {{ loading ? 'ENREGISTREMENT...' : 'SAUVEGARDER' }}
  </app-button>
</footer>
