<main class="min-h-screen w-full bg-[#eaeff1] dark:bg-slate-950 flex justify-center items-center p-4 relative overflow-hidden">
  <!-- Glowing background elements -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/20 blur-[120px] rounded-full mix-blend-multiply"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-tertiary/20 blur-[120px] rounded-full mix-blend-multiply"></div>
  </div>

  <div class="bg-surface-container-lowest max-w-[400px] w-full p-8 sm:p-10 rounded-[2rem] shadow-[0_32px_80px_rgba(43,52,55,0.06)] backdrop-blur-3xl border border-white/40 dark:border-white/5 relative z-10 transition-transform hover:scale-[1.01]">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-gradient-to-br from-primary-container to-tertiary-container rounded-2xl mx-auto flex items-center justify-center mb-5 shadow-inner">
        <span class="material-symbols-outlined text-on-primary-container text-3xl font-extralight">admin_panel_settings</span>
      </div>
      <h1 class="font-headline font-extrabold text-2xl text-on-surface tracking-tight">Pristine Flow</h1>
      <p class="font-body text-[13px] text-on-surface-variant mt-2 font-medium">Administration System</p>
    </div>
    
    <div class="space-y-4">
      <app-input label="Adresse Email" type="email" placeholder="admin@laiterie.com" icon="mail" [(ngModel)]="email"></app-input>
      <app-input label="Mot de passe" type="password" placeholder="••••••••" icon="lock" [showPasswordToggle]="true" [(ngModel)]="password"></app-input>
      
      <div *ngIf="error" class="bg-error-container/40 text-on-error-container text-xs p-3 rounded-xl flex items-center gap-2 border border-error/10 animate-fade-in">
        <span class="material-symbols-outlined text-[16px] text-error">error</span>
        <span class="font-medium">{{ error }}</span>
      </div>
    </div>
    
    <div class="mt-8" (click)="!loading && submit()">
      <app-button variant="primary" extraClasses="w-full flex justify-center py-3 text-[15px] shadow-md shadow-primary/20" [class.opacity-60]="loading">
        <span *ngIf="!loading" class="font-bold tracking-wide uppercase">Se Connecter</span>
        <span *ngIf="loading" class="material-symbols-outlined animate-spin">refresh</span>
      </app-button>
    </div>
  </div>
</main>
