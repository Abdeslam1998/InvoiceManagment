

<div class="space-y-4 pb-36">
  <!-- Client Information Section -->
  <section class="space-y-4">
    <label class="font-label text-xs font-bold tracking-widest text-on-surface-variant uppercase px-1">Informations Principales</label>

    <app-input label="Nom Complet" placeholder="Jean Dupont" icon="badge" [(ngModel)]="name"></app-input>
    <app-input label="Email" placeholder="jean@exemple.com" type="email" icon="mail" [(ngModel)]="email"></app-input>
    <app-input label="Téléphone" placeholder="+33 6 12 34 56 78" type="tel" icon="call" [(ngModel)]="phone"></app-input>
    <app-input label="Adresse" placeholder="12 Chemin des Prés, Paris" icon="home" [(ngModel)]="address"></app-input>
  </section>
</div>

<footer class="fixed bottom-0 left-0 w-full bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-t border-outline/10 px-4 pb-20 pt-4 flex gap-3 z-40">
  <app-button variant="secondary" routerLink="/clients" extraClasses="flex-1">ANNULER</app-button>
  <app-button
    variant="primary"
    extraClasses="flex-[2]"
    [disabled]="loading || !name || !email || !phone"
    (onClick)="save()"
    [icon]="isEdit ? 'save' : 'person_add'"
    class="flex items-center gap-2 px-6 py-3 rounded-2xl shadow-lg hover:shadow-xl hover:scale-105 transition-all duration-200 font-semibold bg-primary text-white"
  >
    {{ isEdit ? 'ENREGISTRER' : 'AJOUTER CLIENT' }}
  </app-button>
</footer>
