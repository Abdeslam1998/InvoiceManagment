<button
  [type]="type"
  [disabled]="disabled"
  (click)="onClick.emit($event)"
  [ngClass]="{
    'bg-gradient-to-br from-primary to-primary-dim text-white shadow-lg hover:-translate-y-px rounded-full px-5 py-2.5 font-label font-bold text-sm': variant === 'primary',
    'bg-surface-container-high text-on-surface rounded-full px-5 py-2.5 font-label font-bold text-sm': variant === 'secondary',
    'text-on-surface-variant hover:bg-surface-container-high rounded-lg p-2': variant === 'ghost',
    'text-error hover:bg-error-container/20 rounded-lg p-2': variant === 'error',
    'opacity-50 cursor-not-allowed': disabled
  }"
  class="transition-all active:scale-95 flex items-center justify-center gap-2 {{extraClasses}}"
>
  @if (icon) {
    <span class="material-symbols-outlined text-[20px]">{{icon}}</span>
  }
  <ng-content></ng-content>
</button>
