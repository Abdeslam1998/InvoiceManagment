<div class="space-y-1 w-full">
  @if (label) {
    <label class="font-label text-sm tracking-tight text-on-surface-variant font-medium uppercase px-1">
      {{label}}
    </label>
  }
  <div class="relative flex items-center bg-surface-container-low rounded-xl px-4 py-3 group focus-within:ring-0 border-b-2 border-transparent focus-within:border-primary transition-all">
    @if (icon) {
      <span class="material-symbols-outlined text-outline mr-3">{{icon}}</span>
    }
    <input 
      [type]="inputType"
      [placeholder]="placeholder"
      [value]="value"
      (input)="onInput($event)"
      (blur)="onTouched()"
      class="bg-transparent border-none focus:ring-0 flex-1 text-on-surface font-body p-0 placeholder:text-outline"
    />
    <button
      *ngIf="showPasswordToggle && type === 'password'"
      type="button"
      class="ml-3 text-on-surface-variant hover:text-on-surface"
      (click)="togglePasswordVisibility()"
      tabindex="-1"
    >
      <span class="material-symbols-outlined">
        {{ passwordVisible ? 'visibility_off' : 'visibility' }}
      </span>
    </button>
  </div>
</div>
